<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="graph-grammar logo mark">
  <title>graph-grammar</title>
  <desc>A graph-rewriting production: a two-node pattern is rewritten into a three-node graph, the new node highlighted.</desc>
  <defs>
    <linearGradient id="gg-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="124" height="124" rx="30" fill="url(#gg-tile)"/>
  <g stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="36" y1="48" x2="36" y2="84"/>
    <path d="M86 40 L104 74 L78 86 Z"/>
  </g>
  <g fill="#ffffff">
    <circle cx="36" cy="48" r="9"/>
    <circle cx="36" cy="84" r="9"/>
    <circle cx="86" cy="40" r="9"/>
    <circle cx="104" cy="74" r="9"/>
  </g>
  <circle cx="78" cy="86" r="9.5" fill="#fbbf24" stroke="#ffffff" stroke-width="2.5"/>
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <line x1="50" y1="66" x2="68" y2="66"/>
    <path d="M62 60 L70 66 L62 72"/>
  </g>
</svg>
