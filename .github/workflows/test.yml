name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]



env:
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1
  # Needed for VScode test runner
  DISPLAY: ':99.0'
  BASE_REF: ${{ github.base_ref }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
 
      - name: Install Dependencies
        run: pnpm install

      # neostandard's style rules double as the formatter, so a single lint
      # step covers both formatting and linting (no separate Prettier check).
      - name: Check linting & formatting
        run: pnpm run lint:ci

      # Skip for now. Move fast and break things.
      # - name: Check types
      #   run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test:ci

