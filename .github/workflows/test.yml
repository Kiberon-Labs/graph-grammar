name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]



env:
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1
  # Needed for VScode test runner
  DISPLAY: ':99.0'
  BASE_REF: ${{ github.base_ref }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
 
      - name: Install Dependencies
        run: pnpm install

      # neostandard's style rules double as the formatter, so a single lint
      # step covers both formatting and linting (no separate Prettier check).
      - name: Check linting & formatting
        run: pnpm run lint:ci

      - name: Check types
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run testa

  native:
    name: Native (Rust) conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/graph-grammar-native

      - name: Install Dependencies
        run: pnpm install

      # The native conformance fixtures and the embedded JSON Schema are both
      # derived from the TS engine, so build it first, then assert the schema is
      # still in lockstep with the zod source before generating fixtures.
      - name: Build engine
        run: pnpm --filter graph-grammar build

      - name: Check schema is in sync with zod
        working-directory: packages/graph-grammar-native
        run: pnpm dlx tsx scripts/emit-schema.ts --check

      - name: Generate conformance fixtures
        working-directory: packages/graph-grammar-native
        run: pnpm dlx tsx conformance/generate.ts

      - name: Run Rust conformance tests
        run: cargo test --manifest-path packages/graph-grammar-native/Cargo.toml

