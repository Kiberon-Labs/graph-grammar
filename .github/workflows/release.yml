name: NPM Release

on:
  push:
    branches:
      - master

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: write
  pages: write
  id-token: write  # Required for OIDC
  pull-requests: write

jobs:
  release:
    environment: npm
    # Prevents changesets action from creating a PR on forks
    if: github.repository == 'Kiberon-Labs/graph-grammar'
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          # NOTE: deliberately no `registry-url` here. Setting it writes an
          # .npmrc with an _authToken=${NODE_AUTH_TOKEN} placeholder, which
          # makes npm take the (empty) token auth path and skip the OIDC
          # trusted-publishing exchange, failing the publish with E404.
          cache: 'pnpm'

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install Dependencies
        run: pnpm i

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1.9.0 
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use OIDC for npm authentication instead of NPM_TOKEN
          # # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868
          NPM_TOKEN: ${{ SECRETS.NPM_TOKEN}}

      # Announce to the company Slack, but only when packages were actually
      # published this run (changesets sets `published=true` only then — not when
      # it merely opens the "Version Packages" PR).
      - name: Notify company Slack of published packages
        if: steps.changesets.outputs.published == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret not set; skipping Slack notification."
            exit 0
          fi
          # `publishedPackages` is a JSON array of { name, version }. Turn it into
          # a bullet list of npm links, then build the payload with jq so all
          # escaping (newlines, special chars) is handled safely.
          PACKAGE_LINES=$(echo "$PUBLISHED_PACKAGES" \
            | jq -r '.[] | "• <https://www.npmjs.com/package/\(.name)/v/\(.version)|\(.name)@\(.version)>"')
          PAYLOAD=$(jq -n \
            --arg pkgs "$PACKAGE_LINES" \
            --arg run "$RUN_URL" \
            --arg repo "${{ github.repository }}" \
            '{
              channel: "#packages",
              username: "GitHub Actions",
              icon_emoji: ":package:",
              text: ("New release published for " + $repo),
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: (":rocket: *New packages published from " + $repo + "*\n" + $pkgs) } },
                { type: "context", elements: [ { type: "mrkdwn", text: ("<" + $run + "|View workflow run>") } ] }
              ]
            }')
          curl -fsS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"